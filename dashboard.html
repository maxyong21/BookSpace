<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings - BookSpace</title>
    <link rel="stylesheet" href="static/dashboard.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="dashboard-container">
        <!-- Header -->
        <div class="dashboard-header">
            <div class="header-left">
                <div class="header-icon">📘</div>
                <div>
                    <h1>My Bookings</h1>
                    <p>Manage your reserved spaces</p>
                </div>
            </div>
            <div class="header-right">
                <div class="user-info">
                    <i class="fas fa-user-circle"></i>
                    <span>{{ user }}</span>
                    <span class="role-badge {{ role }}">{{ role|upper }}</span>
                </div>
                <div class="action-buttons">
                    <a href="/" class="btn btn-secondary">
                        <i class="fas fa-calendar-plus"></i> New Booking
                    </a>
                    <button id="logoutBtn" class="btn btn-danger">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="stats-grid">
            <div class="stat-card">
                <i class="fas fa-calendar-check"></i>
                <div class="stat-info">
                    <h3 id="upcomingCount">0</h3>
                    <p>Upcoming</p>
                </div>
            </div>
            <div class="stat-card">
                <i class="fas fa-history"></i>
                <div class="stat-info">
                    <h3 id="pastCount">0</h3>
                    <p>Past</p>
                </div>
            </div>
            <div class="stat-card">
                <i class="fas fa-ban"></i>
                <div class="stat-info">
                    <h3 id="cancelledCount">0</h3>
                    <p>Cancelled</p>
                </div>
            </div>
            <div class="stat-card">
                <i class="fas fa-clock"></i>
                <div class="stat-info">
                    <h3 id="totalHours">0</h3>
                    <p>Total Hours</p>
                </div>
            </div>
        </div>

        <!-- Search and Filter Bar -->
        <div class="controls-bar">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search by resource name...">
            </div>
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">
                    <i class="fas fa-list"></i> All
                </button>
                <button class="filter-btn" data-filter="upcoming">
                    <i class="fas fa-calendar-day"></i> Upcoming
                </button>
                <button class="filter-btn" data-filter="past">
                    <i class="fas fa-history"></i> Past
                </button>
                <button class="filter-btn" data-filter="cancelled">
                    <i class="fas fa-ban"></i> Cancelled
                </button>
            </div>
        </div>

        <!-- Bookings Container -->
        <div id="bookingsContainer" class="bookings-container">
            <div class="loading-state">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Loading your bookings...</p>
            </div>
        </div>
    </div>

    <!-- Edit Booking Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-edit"></i> Edit Booking</h2>
                <span class="close">&times;</span>
            </div>
            <form id="editForm">
                <input type="hidden" id="editBookingId">
                <div class="form-group">
                    <label><i class="fas fa-building"></i> Resource</label>
                    <input type="text" id="editResourceName" readonly>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-calendar"></i> Date *</label>
                        <input type="date" id="editBookingDate" required min="{{ now }}">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-clock"></i> Start Time *</label>
                        <input type="time" id="editStartTime" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-clock"></i> End Time *</label>
                        <input type="time" id="editEndTime" required>
                    </div>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-pen"></i> Purpose</label>
                    <textarea id="editPurpose" rows="3" placeholder="What's this booking for?"></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-block">
                    <i class="fas fa-save"></i> Save Changes
                </button>
            </form>
        </div>
    </div>

    <!-- Cancel Confirmation Modal -->
    <div id="cancelModal" class="modal">
        <div class="modal-content cancel-modal">
            <div class="modal-header">
                <h2><i class="fas fa-trash-alt"></i> Cancel Booking</h2>
            </div>
            <div class="modal-body">
                <i class="fas fa-exclamation-triangle warning-icon"></i>
                <p>Are you sure you want to cancel this booking?</p>
                <div class="booking-details" id="cancelBookingDetails"></div>
                <p class="warning-text">This action cannot be undone.</p>
            </div>
            <div class="modal-buttons">
                <button id="closeCancelModal" class="btn btn-secondary">
                    <i class="fas fa-times"></i> No, Keep It
                </button>
                <button id="confirmCancelBtn" class="btn btn-danger">
                    <i class="fas fa-check"></i> Yes, Cancel Booking
                </button>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div id="successModal" class="modal">
        <div class="modal-content success-modal">
            <i class="fas fa-check-circle success-icon"></i>
            <h2>Success!</h2>
            <p id="successMessage"></p>
            <button class="btn btn-primary" onclick="closeSuccessModal()">Continue</button>
        </div>
    </div>

    <div id="toastMsg" class="toast-message"></div>

    <script src="{{ url_for('static', filename='dashboard.js') }}"></script>
</body>
</html>
